<!DOCTYPE html>
<html>
<head>
    <title>AI Phishing Email Detector</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:50px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:700px;
            margin:auto;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        textarea{
            width:100%;
            height:200px;
            padding:10px;
            font-size:16px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

<h1>🛡 AI Phishing Email Detector</h1>

<p>Paste an email below and check whether it is phishing or legitimate.</p>

<form method="POST">

<textarea name="email" placeholder="Paste email content here..."></textarea>

<br><br>

<button type="submit">Analyze Email</button>

</form>

<div class="result">
    {{ result }}
</div>

</div>

</body>
</html>
